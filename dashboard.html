  <header>Battery Optimization Dashboard</header>

  <script type="text/babel">
    const API = "http://127.0.0.1:8000";
    const { useState, useEffect, useRef } = React;

    function ChartWrapper({ data, chartTab }) {
      const canvasRef = useRef(null);
      const chartRef  = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !data.length) return;
        if (chartRef.current) chartRef.current.destroy();

        const hours = data.map(r => `Hr ${r.hour}`);
        const ctx   = canvasRef.current.getContext("2d");

        const configs = {
          soc: {
            type: "line",
            datasets: [{ label: "SoC (kWh)", data: data.map(r => r.soc_kw), borderColor: "#1a73e8", backgroundColor: "rgba(26,115,232,0.1)", fill: true, tension: 0.3, pointRadius: 2 }]
          },
          revenue: {
            type: "bar",
            datasets: [{ label: "Revenue ($)", data: data.map(r => r.revenue), backgroundColor: data.map(r => r.revenue >= 0 ? "#2e7d32" : "#c62828") }]
          },
          power: {
            type: "bar",
            datasets: [
              { label: "Charge (kW)",    data: data.map(r => r.charge_kw),    backgroundColor: "#1a73e8" },
              { label: "Discharge (kW)", data: data.map(r => r.discharge_kw), backgroundColor: "#e53935" }
            ]
          }
        };

        chartRef.current = new Chart(ctx, {
          type: configs[chartTab].type,
          data: { labels: hours, datasets: configs[chartTab].datasets },
          options: { responsive: true, plugins: { legend: { position: "top" } }, scales: { x: { ticks: { font: { size: 11 } } } } }
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data, chartTab]);

      return <canvas ref={canvasRef} height={100} />;
    }

    function App() {
      const [batteries,       setBatteries]       = useState([]);
      const [selectedBattery, setSelectedBattery] = useState(null);
      const [viewMode,        setViewMode]         = useState("latest");
      const [data,            setData]             = useState([]);
      const [loading,         setLoading]          = useState(false);
      const [error,           setError]            = useState(null);
      const [chartTab,        setChartTab]         = useState("soc");

      useEffect(() => {
        fetch(`${API}/batteries`)
          .then(r => r.json())
          .then(b => { setBatteries(b); if (b.length) setSelectedBattery(b[0].battery_id); })
          .catch(() => setError("Could not connect to API. Make sure uvicorn is running on port 8000."));
      }, []);

      useEffect(() => {
        if (!selectedBattery) return;
        setLoading(true);
        setError(null);
        const url = viewMode === "latest"
          ? `${API}/optimization/battery/${selectedBattery}/latest`
          : `${API}/optimization/battery/${selectedBattery}/all`;
        fetch(url)
          .then(r => r.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(() => { setError("Failed to load optimization data."); setLoading(false); });
      }, [selectedBattery, viewMode]);

      const latestVersion = data.length ? Math.max(...data.map(r => r.version)) : null;
      const chartData     = data.filter(r => r.version === latestVersion).sort((a, b) => a.hour - b.hour);
      const totalRevenue  = chartData.reduce((s, r) => s + r.revenue, 0);
      const totalCharge   = chartData.reduce((s, r) => s + r.charge_kw, 0);
      const totalDischarge= chartData.reduce((s, r) => s + r.discharge_kw, 0);
      const selectedBatt  = batteries.find(b => b.battery_id === selectedBattery);

      return (
        <div className="container">

          {error && <div className="card error">{error}</div>}

          <div className="card">
            <h2>Select Battery</h2>
            <div className="battery-list">
              {batteries.map(b => (
                <div key={b.battery_id}
                  className={`battery-chip ${selectedBattery === b.battery_id ? "active" : ""}`}
                  onClick={() => setSelectedBattery(b.battery_id)}>
                  {b.name} — {b.location}
                </div>
              ))}
            </div>
          </div>

          {selectedBatt && (
            <div className="summary-row">
              <div className="summary-card"><div className="label">Battery</div><div className="value" style={{fontSize:"1rem"}}>{selectedBatt.name}</div></div>
              <div className="summary-card"><div className="label">Owner</div><div className="value" style={{fontSize:"1rem"}}>{selectedBatt.owner}</div></div>
              <div className="summary-card"><div className="label">ISO</div><div className="value">{selectedBatt.iso}</div></div>
              <div className="summary-card"><div className="label">Total Revenue</div><div className="value" style={{color: totalRevenue >= 0 ? "#2e7d32" : "#c62828"}}>${totalRevenue.toFixed(2)}</div></div>
              <div className="summary-card"><div className="label">Total Charged</div><div className="value" style={{color:"#1a73e8"}}>{totalCharge.toFixed(0)} kW</div></div>
              <div className="summary-card"><div className="label">Total Discharged</div><div className="value" style={{color:"#e53935"}}>{totalDischarge.toFixed(0)} kW</div></div>
            </div>
          )}

            <div className="controls">

                <option value="latest">Latest Run Only</option>
                <option value="all">All Historical Runs</option>
              </select>
            </div>
          </div>

          <div className="card">
            <div className="tabs">
              <button className={`tab ${chartTab === "soc"     ? "active" : ""}`} onClick={() => setChartTab("soc")}>State of Charge</button>
              <button className={`tab ${chartTab === "revenue" ? "active" : ""}`} onClick={() => setChartTab("revenue")}>Revenue</button>
              <button className={`tab ${chartTab === "power"   ? "active" : ""}`} onClick={() => setChartTab("power")}>Charge / Discharge</button>
            </div>
            {chartData.length > 0 && <ChartWrapper data={chartData} chartTab={chartTab} />}
          </div>

          <div className="card">
            <h2>Schedule Detail</h2>
            {loading ? (
              <div className="loading">Loading...</div>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>Version</th><th>Date</th><th>Hour</th><th>Action</th>

                    <th>Price $/MWh</th><th>Revenue $</th>
                  </tr>
                </thead>
                <tbody>
                  {data.map((r, i) => (
                    <tr key={i}>
                      <td>{r.version}</td>
                      <td>{r.date}</td>
                      <td>{r.hour}</td>
                      <td className={r.action}>{r.action}</td>
                      <td>{r.charge_kw.toFixed(1)}</td>
                      <td>{r.discharge_kw.toFixed(1)}</td>
                      <td>{r.soc_kw.toFixed(1)}</td>
                      <td>{(r.price_mwh * 1000).toFixed(2)}</td>
                      <td className={r.revenue >= 0 ? "pos" : "neg"}>{r.revenue.toFixed(2)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
